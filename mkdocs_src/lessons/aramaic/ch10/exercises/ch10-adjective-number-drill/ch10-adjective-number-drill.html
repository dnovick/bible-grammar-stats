<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BBA Ch10 — Adjective and Number Drill</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 1050px; margin: 2em auto; padding: 0 1em; }
  h1 { font-size: 1.3em; }
  p.instructions { background: #f5f5f5; border-left: 4px solid #888; padding: .6em 1em; }
  table { border-collapse: collapse; width: 100%; margin-bottom: 1.5em; }
  th, td { border: 1px solid #ccc; padding: .35em .5em; text-align: left; vertical-align: top; }
  th { background: #e8e8e8; }
  td.aram { font-size: 1.4em; text-align: right; font-family: "SBL Hebrew", "Ezra SIL", serif; direction: rtl; min-width: 110px; unicode-bidi: embed; }
  input.parse-field { width: 95%; border: none; border-bottom: 1px solid #999; font-size: .9em; }
  .answer-row td { background: #e6ffe6; font-size: .85em; }
  .answer-row { display: none; }
  .btn { padding: .25em .6em; margin: .2em; cursor: pointer; font-size: .85em; }
  .btn-ans { background: #e0e0e0; border: 1px solid #aaa; border-radius: 3px; }
  .global-btns { margin-bottom: 1em; }
  @media print {
    .btn, .global-btns { display: none; }
    input.parse-field { border-bottom: 1px solid #555; }
    .answer-row { display: none !important; }
  }
</style>
</head>
<body>
<h1>BBA Chapter 10 — Adjective and Number Drill</h1>
<p class="instructions"><strong>Instructions:</strong> For each form, identify whether it is an adjective or number, give the state/value and gender/number, and translate.</p>

<div class="global-btns">
  <button class="btn" onclick="showAll()">Show All Answers</button>
  <button class="btn" onclick="hideAll()">Hide All Answers</button>
  <button class="btn" onclick="clearAll()">Clear All Inputs</button>
</div>

<script>
// [num, form, adjNum, stateVal, gn, trans]
var rows = [
  [1,  "רַב",                  "adjective",           "absolute",          "ms",      "great, large"],
  [2,  "שִׁבְעָה יוֹמִין",     "number",              "cardinal 7",        "ms noun", "seven days"],
  [3,  "חֵיוָה אָחֳרִי",       "adjective",           "absolute",          "fs",      "another beast"],
  [4,  "צְלֵם חַד",            "number / indef. art.","cardinal 1",        "ms",      "one statue / a statue"],
  [5,  "מַלְכָּא רַבָּא",      "adjective",           "determined",        "ms",      "the great king"],
  [6,  "קַדְמָיָא",            "adjective (ordinal)", "determined",        "ms",      "the first"],
  [7,  "תְּרֵין שָׁנִין",      "number",              "cardinal 2",        "fp noun", "two years"],
  [8,  "חַכִּימִין רַבְרְבִין","adjective",           "absolute",          "mp",      "great/mighty wise men"],
  [9,  "תְּלִיתַי",            "adjective (ordinal)", "absolute",          "ms",      "third"],
  [10, "אֱלָהּ קַדִּישׁ",      "adjective",           "absolute",          "ms",      "a holy God"],
  [11, "אַרְבְּעָה חֵיוָן",    "number",              "cardinal 4",        "fp noun", "four beasts"],
  [12, "שַׂגִּיאָה",           "adjective",           "determined",        "fs",      "the great/much (one)"],
  [13, "חֲמֵשׁ מְדִינָן",      "number",              "cardinal 5",        "fp noun", "five provinces"],
  [14, "מַלְכוּ אָחֳרִי",      "adjective",           "absolute",          "fs",      "another kingdom"],
  [15, "שִׁבְעָה עִדָּנִין",   "number",              "cardinal 7",        "mp noun", "seven times / periods"],
  [16, "יְקַר עִלָּאָה",       "adjective",           "determined",        "ms",      "the highest honor"],
  [17, "תִּנְיָן",             "adjective (ordinal)", "absolute",          "ms",      "second"],
  [18, "תְּמָנֵה גֻּבְרִין",   "number",              "cardinal 8",        "mp noun", "eight men"],
  [19, "אֱלָה שְׁמַיָּא חַיָּא","adjective",          "absolute",          "ms",      "the living God of heaven"],
  [20, "חַד מִן",              "number",              "cardinal 1 (partitive)","—",   "one of..."]
];

document.addEventListener("DOMContentLoaded", function() {
  var t = document.createElement("table"); document.body.appendChild(t);
  var thead = document.createElement("thead");
  var hr = document.createElement("tr");
  ["#","Form","Adj / Num","State / Value","G/N","Translation",""].forEach(function(h){
    var th = document.createElement("th"); th.textContent = h; hr.appendChild(th);
  });
  thead.appendChild(hr); t.appendChild(thead);

  var tbody = document.createElement("tbody");
  rows.forEach(function(row) {
    var num = row[0], form = row[1], adjNum = row[2], stateVal = row[3], gn = row[4], trans = row[5];

    var qrow = document.createElement("tr");
    qrow.innerHTML =
      '<td>' + num + '</td>' +
      '<td class="aram">' + form + '</td>' +
      '<td><input class="parse-field" type="text" placeholder="adj / num"></td>' +
      '<td><input class="parse-field" type="text" placeholder="state / value"></td>' +
      '<td><input class="parse-field" type="text" placeholder="G/N"></td>' +
      '<td><input class="parse-field" type="text" placeholder="translation"></td>' +
      '<td><button class="btn btn-ans" onclick="toggle(\'a'+num+'\')">▶ Answer</button></td>';
    tbody.appendChild(qrow);

    var arow = document.createElement("tr");
    arow.id = "a" + num; arow.className = "answer-row";
    arow.innerHTML =
      '<td></td>' +
      '<td class="aram">' + form + '</td>' +
      '<td>' + adjNum + '</td>' +
      '<td>' + stateVal + '</td>' +
      '<td>' + gn + '</td>' +
      '<td colspan="2">' + trans + '</td>';
    tbody.appendChild(arow);
  });
  t.appendChild(tbody);
});

function toggle(id) {
  var el = document.getElementById(id);
  el.style.display = (el.style.display === "table-row") ? "none" : "table-row";
}
function showAll() { document.querySelectorAll(".answer-row").forEach(function(r){ r.style.display="table-row"; }); }
function hideAll() { document.querySelectorAll(".answer-row").forEach(function(r){ r.style.display="none"; }); }
function clearAll() { document.querySelectorAll("input.parse-field").forEach(function(i){ i.value=""; }); }
</script>
</body>
</html>
