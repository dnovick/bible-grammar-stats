name: Deploy Site to S3

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'output/lessons/**'
      - 'output/student-packs/**'
      - 'mkdocs_src/**'
      - 'mkdocs.yml'
      - 'mkdocs_nav.yml'
      - 'scripts/build_mkdocs.py'
      - '.github/workflows/deploy-site.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs dependencies
        run: |
          pip install \
            mkdocs==1.6.1 \
            mkdocs-material==9.7.6 \
            mkdocstrings==1.0.4 \
            mkdocstrings-python==2.0.3

      - name: Build MkDocs source tree
        run: python scripts/build_mkdocs.py

      - name: Build MkDocs site
        run: mkdocs build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync landing page to S3
        run: |
          aws s3 sync site/ s3://${{ secrets.S3_BUCKET }}/ \
            --exclude "learn/*" \
            --cache-control "max-age=300"

      - name: Sync MkDocs site to S3 under /learn/
        run: |
          aws s3 sync mkdocs_out/ s3://${{ secrets.S3_BUCKET }}/learn/ \
            --delete \
            --cache-control "max-age=300"

      - name: Upload student pack ZIPs
        run: |
          for f in output/student-packs/*.zip; do
            aws s3 cp "$f" s3://${{ secrets.S3_BUCKET }}/downloads/ \
              --cache-control "max-age=86400"
          done

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
