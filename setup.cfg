[flake8]
max-line-length = 100
# __init__.py contains intentional re-exports — F401 is expected there
# exercise_pdf.py contains embedded Hebrew exercise data as long string literals
per-file-ignores =
    src/bible_grammar/__init__.py: F401
    src/bible_grammar/exercise_pdf.py: E501,E221,E127,E128

[mypy]
ignore_missing_imports = True
warn_unused_ignores = True
warn_return_any = False
disallow_untyped_defs = False
check_untyped_defs = True
